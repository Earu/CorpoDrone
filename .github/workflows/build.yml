name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build audio-capture
        run: cargo build --release -p audio-capture

      - name: Build Tauri app
        run: cargo build --release -p corpo-drone

      - name: Package zip
        shell: pwsh
        run: |
          $name = "CorpoDrone-windows-x64"
          New-Item -ItemType Directory -Path $name | Out-Null

          Copy-Item target\release\corpo-drone.exe  $name\
          Copy-Item target\release\audio-capture.exe $name\
          Copy-Item config.toml                      $name\
          Copy-Item .env.example                     $name\
          Copy-Item -Recurse pipeline                $name\

          Compress-Archive -Path $name -DestinationPath "$name.zip"
          Write-Host "Created $name.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CorpoDrone-windows-x64
          path: CorpoDrone-windows-x64.zip
          retention-days: 30

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build audio-capture
        run: cargo build --release -p audio-capture

      - name: Build Tauri app
        run: cargo build --release -p corpo-drone

      - name: Package zip
        run: |
          NAME="CorpoDrone-macos-arm64"
          mkdir "$NAME"

          cp target/release/corpo-drone  "$NAME/"
          cp target/release/audio-capture "$NAME/"
          cp config.toml                  "$NAME/"
          cp .env.example                 "$NAME/"
          cp -r pipeline                  "$NAME/"

          zip -r "$NAME.zip" "$NAME"
          echo "Created $NAME.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CorpoDrone-macos-arm64
          path: CorpoDrone-macos-arm64.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libpulse-dev

      - name: Build audio-capture
        run: cargo build --release -p audio-capture

      - name: Build Tauri app
        run: cargo build --release -p corpo-drone

      - name: Package zip
        run: |
          NAME="CorpoDrone-linux-x64"
          mkdir "$NAME"
          cp target/release/corpo-drone "$NAME/"
          cp target/release/audio-capture "$NAME/"
          cp config.toml "$NAME/"
          cp .env.example "$NAME/"
          cp -r pipeline "$NAME/"
          zip -r "$NAME.zip" "$NAME"
          echo "Created $NAME.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CorpoDrone-linux-x64
          path: CorpoDrone-linux-x64.zip
          retention-days: 30
