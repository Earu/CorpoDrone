<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpoDrone</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>CorpoDrone</h1>
      <div id="controls">
        <button id="btn-start" onclick="startRecording()">Start</button>
        <button id="btn-stop" onclick="stopRecording()" disabled>Stop</button>
        <span id="status-badge" class="badge badge-idle">Idle</span>
        <span id="ws-badge" class="badge badge-disconnected">WS</span>
      </div>
    </header>

    <div id="main">
      <section id="transcript-panel">
        <div class="panel-header">
          <h2>Live Transcript</h2>
          <button onclick="clearTranscript()" class="btn-sm">Clear</button>
        </div>
        <div id="transcript" class="scrollable"></div>
      </section>

      <aside id="sidebar">
        <section id="speakers-panel">
          <h2>Speakers</h2>
          <div id="speakers-list"></div>
        </section>
      </aside>
    </div>
  </div>

  <!-- Summary modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Meeting Summary</h2>
        <div class="modal-actions">
          <button id="btn-copy" class="modal-copy" onclick="copySummary()" title="Copy summary">Copy</button>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
