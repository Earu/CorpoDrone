# CorpoDrone configuration
# Edit this file to configure the pipeline without recompiling.

[python]
# Whisper model size: tiny / base / small / medium / large-v3
# Larger = more accurate but slower. "small" is a good default.
whisper_model = "small"
whisper_device = "auto"       # auto / cuda / cpu
whisper_compute_type = "auto" # auto / float16 / int8

# Speaker diarization (requires HuggingFace token)
diarize = true
min_speakers = 1
max_speakers = 8

# Sliding window config (seconds)
# Whisper and PyAnnote both need long context to work well.
# window_seconds: how much audio to transcribe/diarize each step (15-30s recommended)
# step_seconds: how often to process a new window (3-5s recommended)
window_seconds = 20.0
step_seconds = 3.0

# Summarization via Ollama (generated once when Stop is pressed)
summarize = true
# Whisper model used for the final full-session re-transcription (better quality than streaming)
summarize_model = "medium"
ollama_model = "mistral"
ollama_host = "http://localhost:11434"

# Named pipes (must match Rust side)
audio_pipe = '\\.\pipe\corpodrone-audio'
transcript_pipe = '\\.\pipe\corpodrone-transcript'

[server]
# Python executable — points at the venv
python_exe = '.venv\Scripts\python.exe'
python_script = 'pipeline\pipeline.py'
